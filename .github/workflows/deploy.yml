name: Deploy to cPanel (Appleboy Style)

on:
  push:
    branches:
      - main
      - feat/TO452

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, curl, openssl, xml, zip

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-progress --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Setup SSH Key
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "./*"
          target: ${{ secrets.REMOTE_PATH }}
          rm: false
          strip_components: 0
          overwrite: true
          exclude: |
            .git/
            .github/
            node_modules/
            .env
            storage/*.key
            storage/framework/cache/*
            storage/framework/sessions/*
            storage/framework/views/*
            storage/logs/*

      - name: Post-Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.REMOTE_PATH }}
            echo "🚀 Running post-deployment tasks..."
            
            # Ensure folder permissions
            chmod -R 775 storage bootstrap/cache
            
            # Run Laravel tasks
            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize
            php artisan storage:link || echo "Storage link already exists."
            
            echo "✅ Deployment finished successfully at $(date)!"
