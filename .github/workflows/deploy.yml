name: 🚀 Deploy to cPanel (Stable)

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            # 1. Checkout code
            - name: 📥 Checkout Code
              uses: actions/checkout@v4

            # 2. Debug (rất quan trọng để tránh lỗi empty archive)
            - name: 🔍 Debug files
              run: |
                  echo "Current dir:"
                  pwd
                  echo "List files:"
                  ls -la

            # 3. Setup PHP
            - name: 🐘 Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  extensions: mbstring, bcmath, curl, openssl, xml, zip

            # 4. Install Composer
            - name: 📦 Install Composer Dependencies
              run: composer install --no-dev --optimize-autoloader --no-interaction

            # 5. Setup Node
            - name: 🟢 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            # 6. Build FE
            - name: 🛠 Build Assets
              run: |
                  npm install
                  npm run build

            # 7. Upload code (Optimized)
            - name: 🚚 Upload to Server
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  passphrase: ${{ secrets.SSH_PASSPHRASE }}
                  port: ${{ secrets.SSH_PORT || 22 }}
                  source: "./*, .htaccess" # Explicitly include .htaccess just in case
                  target: ${{ secrets.REMOTE_PATH }}
                  overwrite: true
                  rm: false
                  exclude: |
                      .git/
                      .github/
                      node_modules/
                      .env
                      storage/*.key
                      storage/framework/cache/*
                      storage/framework/sessions/*
                      storage/framework/views/*
                      storage/logs/*

            # 8. Run command on server
            - name: ⚙️ Run Deployment Script
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  passphrase: ${{ secrets.SSH_PASSPHRASE }}
                  port: ${{ secrets.SSH_PORT || 22 }}
                  script: |
                      cd ${{ secrets.REMOTE_PATH }}

                      echo "🚀 Start post-deploy at $(date)"

                      # Ensure permissions
                      chmod -R 775 storage bootstrap/cache

                      # Laravel optimization
                      php artisan migrate --force
                      php artisan optimize:clear
                      php artisan optimize
                      php artisan storage:link || true

                      echo "✅ Deployment finished successfully at $(date)!"
